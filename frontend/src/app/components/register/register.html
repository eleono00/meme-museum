<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="w-full max-w-md rounded-lg bg-white p-8 shadow-md">
    
    <h2 class="mb-6 text-center text-2xl font-bold text-gray-800">Crea Account</h2>

    <form (ngSubmit)="onRegister()" #registerForm="ngForm">
      
      <div class="mb-4">
        <label class="block text-sm font-bold text-gray-700" for="username">Username</label>
        <input 
          type="text" id="username" name="username"
          [(ngModel)]="user.username" required
          class="w-full rounded border px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Il tuo nome utente"
        >
      </div>

      <div class="mb-4">
        <label class="block text-sm font-bold text-gray-700" for="email">Email</label>
        <input 
          type="email" id="email" name="email"
          [(ngModel)]="user.email" required
          class="w-full rounded border px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="mario@esempio.com"
        >
      </div>

      <div class="mb-6">
        <label class="block text-sm font-bold text-gray-700" for="password">Password</label>
        <input 
          type="password" id="password" name="password"
          [(ngModel)]="user.password" required
          class="w-full rounded border px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="********"
        >
      </div>

      <button 
        type="submit" [disabled]="!registerForm.form.valid"
        class="w-full rounded bg-blue-500 px-4 py-2 font-bold text-white hover:bg-blue-700 focus:outline-none disabled:bg-gray-400"
      >
        Registrati
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-600">
      Hai già un account? 
      <a routerLink="/login" class="text-blue-500 hover:text-blue-800">Accedi qui</a>
    </p>
  </div>
</div>
